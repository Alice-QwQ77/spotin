<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>面板登录</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="ambient"></div>
    <main class="shell">
      <section class="login-card">
        <p class="eyebrow">Spotify Login Keeper</p>
        <h1>请输入面板口令</h1>
        <p class="subtitle">口令用于保护管理入口，登录后会保存为 HttpOnly Cookie。</p>
        {% if error %}
        <div class="alert">{{ error }}</div>
        {% endif %}
        <form method="post" class="login-form">
          <label>
            <span>口令</span>
            <input type="password" name="token" placeholder="PANEL_TOKEN" required />
          </label>
          <button class="primary" type="submit">登录</button>
        </form>
      </section>
    </main>
  </body>
</html>
